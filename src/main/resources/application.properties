spring.application.name=product-service-group-2

# Database Configuration
# Uses Environment Variables if present (Render), otherwise falls back to H2 (Local/Tests)
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
# JPA/Hibernate settings
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.ddl-auto=update
spring.jpa.show-sql=true
auth-service.base-url=${AUTH_SERVER}
# --- Swagger/OpenAPI ---
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
