 spring.application.name=product-service-group-2

# Database Configuration
# Uses Environment Variables if present (Render), otherwise falls back to H2 (Local/Tests)
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA/Hibernate settings
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (Optional: access via /h2-console when running locally)
spring.h2.console.enabled=true

